<!DOCTYPE html>
<html lang="pt-br">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>AlphaPROMO - Grupos de Ofertas Exclusivas</title>
	<meta name="description" content="Entre para os grupos AlphaPROMO no Telegram e WhatsApp e receba ofertas e promoções exclusivas todos os dias!">
	<style>
		body {
			background: #000;
			min-height: 100vh;
			margin: 0;
			display: flex;
			justify-content: center;
			align-items: center;
		}
		.container {
			width: 100%;
			max-width: 420px;
			display: flex;
			flex-direction: column;
			align-items: center;
			padding: 0 10px;
		}
		.logo {
			width: 100%;
			text-align: center;
			margin-top: 32px;
		}
		.logo img {
			max-width: 180px;
			height: auto;
		}
		.welcome {
			color: #fff;
			margin-top: 18px;
			font-family: Arial, Helvetica, sans-serif;
			font-size: 1.2rem;
			text-align: center;
		}
		.desc {
			color: #b3b3b3;
			margin: 24px 0 32px 0;
			font-size: 1rem;
			text-align: center;
			font-family: Arial, Helvetica, sans-serif;
			line-height: 1.5;
		}
		.custom-btn {
			display: flex;
			align-items: center;
			justify-content: center;
			gap: 12px;
			margin: 36px auto 0 auto;
			padding: 16px 18px;
			border: 2px solid #fff;
			border-radius: 10px;
			background: transparent;
			color: #fff;
			font-size: 1.1rem;
			font-family: Arial, Helvetica, sans-serif;
			text-decoration: none;
			max-width: 350px;
			width: 100%;
			box-sizing: border-box;
			transition: background 0.2s, color 0.2s, transform 0.18s cubic-bezier(.4,1.5,.5,1), box-shadow 0.18s cubic-bezier(.4,1.5,.5,1);
			text-align: center;
			outline: none;
			position: relative;
		}
		.custom-btn:active {
			background: rgba(255,255,255,0.13);
			color: #fff;
			transform: scale(0.98);
			box-shadow: 0 0 8px 1px rgba(255,255,255,0.10);
		}
		.custom-btn:focus-visible {
			outline: 2px solid #2196f3;
			outline-offset: 2px;
		}
		.custom-btn:hover, .custom-btn:focus {
			background: rgba(255,255,255,0.07);
			color: #fff;
			transform: scale(1.04);
			box-shadow: 0 0 16px 2px rgba(255,255,255,0.18);
			border-color: #fff;
		}
		.custom-btn img {
			width: 32px;
			height: 32px;
			border-radius: 50%;
			padding: 4px;
		}
		@media (max-width: 500px) {
			body {
				align-items: flex-start;
			}
			.container {
				margin-top: 32px;
			}
			.logo img {
				max-width: 120px;
			}
			.custom-btn {
				font-size: 1rem;
				padding: 10px 6px;
				gap: 8px;
				margin: 28px auto 0 auto;
			}
			.custom-btn img {
				width: 26px;
				height: 26px;
				padding: 2px;
			}
			.welcome {
				font-size: 1rem;
			}
			.desc {
				font-size: 0.95rem;
				margin: 18px 0 24px 0;
			}
		}
	</style>
</head>
<body>
</body>
</html>
	<div class="container">
		<div class="logo">
			<img src="images/logo.jpg" alt="Logo AlphaPROMO" style="border: 2px solid #fff; border-radius: 50%; background: transparent; padding: 4px;">
		</div>
		<div class="welcome">Bem-vindo ao AlphaPROMO</div>
		<a href="https://t.me/ALPHAPROMO1" class="custom-btn" target="_blank" rel="noopener noreferrer" aria-label="Entrar no Grupo Telegram">
			<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/82/Telegram_logo.svg/960px-Telegram_logo.svg.png" alt="Telegram" style="background:#229ED9;">
			<span>Entrar no Grupo Telegram</span>
			<span style="font-size:1.5rem;">🔥</span>
		</a>
		<a href="https://chat.whatsapp.com/BByEEEaiAELA8dBaf5E9To?mode=gi_t" class="custom-btn" style="margin-top:24px;" target="_blank" rel="noopener noreferrer" aria-label="Entrar no Grupo WhatsApp">
			<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp" style="background:#25D366;">
			<span>Entrar no Grupo WhatsApp</span>
			<span style="font-size:1.5rem;">💬</span>
		</a>
	</div>
</body>
